  # Both tools share ~/.gemini/oauth_creds.json. Token is refreshed automatically by
  # the gemini CLI binary; faigate reads it via faigate-auth google-antigravity.
  #
  # cloudcode-pa API: custom Gemini wrapper with {model, project, request: <gemini_body>}
  #   Backend: google-codeassist  (Bearer auth, wraps Gemini format)
  #   Endpoint: https://cloudcode-pa.googleapis.com/v1internal
  #   google_project: your Google project ID (from gemini-cli token exchange)
  #
  # Prerequisites: gemini CLI must be authenticated (gemini auth login)
  #   Token file: ~/.gemini/oauth_creds.json
  #
  antigravity:
    backend: oauth
    oauth:
      helper: "faigate-auth google-antigravity"
      client_id: "1071006060591-tmhssin2h21lcre235vtolojh4g403ep.apps.googleusercontent.com"
      token_endpoint: "https://oauth2.googleapis.com/token"
      refresh_endpoint: "https://oauth2.googleapis.com/token"
    underlying_backend: google-codeassist
    base_url: "https://cloudcode-pa.googleapis.com/v1internal"
    google_project: "yarling-bloom-d80f5"
    model: gemini-2.5-pro
    tier: default
    capabilities:
      cost_tier: free
      latency_tier: balanced
      streaming: false
    timeout:
      connect_s: 10
      read_s: 90

