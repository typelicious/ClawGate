      helper: "faigate-auth qwen-portal"
      client_id: "f0304373b74a44d2b584a3fb70ca9e56"
      token_endpoint: "https://chat.qwen.ai/api/v1/oauth2/token"
      refresh_endpoint: "https://chat.qwen.ai/api/v1/oauth2/token"
