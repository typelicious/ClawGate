  #   api_key: ${NVIDIA_API_KEY}
  #   backend: openai-compat
  #   base_url: ${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
  #   model: deepseek-ai/deepseek-r1
  #   tier: default
  #   timeout:
  #     connect_s: 10
  #     read_s: 90
request_hooks:
  enabled: true
  hooks:
  - prefer-provider-header
  - locality-header
  - profile-override-header
  - mode-override-header
  on_error: continue
api_surfaces:
  anthropic_messages: true
anthropic_bridge:
  enabled: true
  allow_claude_code_hints: true
  model_aliases:
    claude-code: auto
    claude-code-fast: eco
    claude-code-premium: premium
    claude-sonnet-4-6: auto
    claude-sonnet-4-6-20251001: auto
    claude-sonnet-4-6[1m]: auto
    claude-opus-4-6: premium
    claude-opus-4-6-20251001: premium
    claude-opus-4-6[1m]: premium
    claude-haiku-4-5: eco
    claude-haiku-4-5-20251001: eco
    # Claude Desktop model aliases
    claude-3-5-sonnet-20241022: auto
    claude-3-5-sonnet: auto
    claude-3-opus-20240229: premium
    claude-3-opus: premium
    claude-3-haiku-20240307: eco
    claude-3-haiku: eco
routing_modes:
  default: auto
  enabled: true
  modes:
    auto:
      aliases: []
      best_for: General use
      description: Balanced (default)
      savings: Balanced
      select:
        prefer_tiers:
        - default
        - reasoning
        - mid
    coding-auto:
      aliases:
      - code-auto
      - dev-auto
      best_for: Daily coding with strong cost control
      description: Cheapest capable coding route
      savings: High savings
      select:
        capability_values:
          cost_tier:
          - free
          - cheap
          - standard
        prefer_tiers:
        - default
        - cheap
        - fallback
        - reasoning
        - mid
        routing_mode: eco
    coding-fast:
      aliases:
      - code-fast
      - dev-fast
      best_for: Fast iterative coding loops
      description: Speed-first coding workhorse
      savings: High savings
      select:
        capability_values:
          cost_tier:
          - free
          - cheap
          - standard
        prefer_tiers:
        - cheap
        - default
        - fallback
        prefer_providers:
        - gemini-flash-lite
        - gemini-flash
        - anthropic-haiku
        - deepseek-chat
        routing_mode: eco
    coding-premium:
      aliases:
      - code-premium
      - dev-premium
      best_for: Architecture, review, and high-risk coding changes
      description: Strongest coding lanes with cost still visible
      savings: Lowest savings
      select:
        prefer_tiers:
        - reasoning
        - default
        - mid
        - high
        routing_mode: premium
    eco:
      aliases: []
      best_for: Maximum savings
      description: Cheapest possible
      savings: Aggressive savings
      select:
        capability_values:
          cost_tier:
          - free
          - cheap
          - standard
        prefer_providers:
        - anthropic-haiku
        - gemini-flash-lite
        - gemini-flash
        - deepseek-chat
        prefer_tiers:
        - cheap
        - fallback
        - default
    free:
      aliases: []
      best_for: Zero-cost routing
      description: Free tier only
      savings: 100%
      select:
        allow_providers: &id001
        - kilocode
        - blackbox-free
        capability_values:
          cost_tier:
          - free
        prefer_providers: *id001
    premium:
      aliases: []
      best_for: Mission-critical work
      description: Best quality
      savings: Lowest savings
      select:
        prefer_providers:
        - anthropic-sonnet
        - openai-gpt4o
        - gemini-pro-high
        - anthropic-claude
        - deepseek-reasoner
        prefer_tiers:
        - high
        - mid
        - reasoning
routing_policies:
  enabled: false
  rules:
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - n8n
      - client_profile:
        - n8n
    name: n8n-cheap-default
    select:
      prefer_tiers:
      - cheap
      - default
      - mid
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - opencode
      - client_profile:
        - opencode
    name: opencode-general
    select:
      prefer_tiers:
      - default
      - mid
      - reasoning
security:
  cache_control: no-store
  max_header_value_chars: 160
  max_json_body_bytes: 1048576
  max_upload_bytes: 10485760
  response_headers: true
server:
  host: 127.0.0.1
  log_level: info
  port: 8092
static_rules:
  enabled: true
  rules:
  - match:
      any:
      - system_prompt_contains:
        - heartbeat
        - health check
        - status check
        - are you there
      - model_requested:
        - heartbeat
        - cheap
        - flash-lite
    name: heartbeat
    route_to: gemini-flash-lite
  - match:
      model_requested:
      - reasoner
      - r1
      - think
      - deepseek-reasoner
    name: explicit-reasoner
    route_to: deepseek-reasoner
  - match:
      model_requested:
      - flash
      - gemini
      - vision
    name: explicit-flash
    route_to: gemini-flash
  - match:
      model_requested:
      - chat
      - ds
      - default
      - deepseek-chat
    name: explicit-chat
    route_to: deepseek-chat
  - match:
      model_requested:
      - codex-mini
      - openai-codex-mini
      - gpt-5.1-codex-mini
      - codex-spark
      - openai-codex-spark
      - gpt-5.3-codex-spark
    name: explicit-codex-mini
    route_to: openai-codex-mini
  - match:
      model_requested:
      - codex-xhigh
      - openai-codex-xhigh
      - gpt-5.3-codex-xhigh
    name: explicit-codex-xhigh
    route_to: openai-codex-xhigh
  - match:
      model_requested:
      - codex-high
      - openai-codex-high
      - gpt-5.3-codex-high
    name: explicit-codex-high
    route_to: openai-codex-high
  - match:
      model_requested:
      - codex-low
      - openai-codex-low
      - gpt-5.3-codex-low
    name: explicit-codex-low
    route_to: openai-codex-low
  - match:
      model_requested:
      - codex-5.4-xhigh
      - openai-codex-5.4-xhigh
      - gpt-5.4-xhigh
    name: explicit-codex-5.4-xhigh
    route_to: openai-codex-5.4-xhigh
  - match:
      model_requested:
      - codex-5.4-high
      - openai-codex-5.4-high
      - gpt-5.4-high
    name: explicit-codex-5.4-high
    route_to: openai-codex-5.4-high
  - match:
      model_requested:
      - codex-5.4-medium
      - openai-codex-5.4-medium
      - gpt-5.4-medium
    name: explicit-codex-5.4-medium
    route_to: openai-codex-5.4-medium
  - match:
      model_requested:
      - codex-5.4-low
      - openai-codex-5.4-low
      - gpt-5.4-low
    name: explicit-codex-5.4-low
    route_to: openai-codex-5.4-low
  - match:
      model_requested:
      - codex
      - openai-codex
      - gpt-5.4
      - gpt-5.3-codex
    name: explicit-codex
    route_to: openai-codex
  - match:
      any:
      - system_prompt_contains:
        - sub-agent
        - subagent
        - parallel task
        - delegated task
      - header_contains:
          x-openclaw-source:
          - subagent
          - sub-agent
    name: subagent
    route_to: deepseek-chat
update_check:
  api_base: https://api.github.com
  check_interval_seconds: 21600
  enabled: true
  release_channel: stable
  repository: fusionAIze/faigate
  timeout_seconds: 5
