auto_update:
  allow_major: false
  apply_command: faigate-update
  enabled: false
  maintenance_window:
    days:
    - sat
    - sun
    enabled: false
    end_hour: 5
    start_hour: 2
    timezone: UTC
  max_unhealthy_providers: 0
  min_release_age_hours: 0
  provider_scope:
    allow_providers: []
    deny_providers:
    - openrouter-fallback
  require_healthy_providers: true
  rollout_ring: early
  verification:
    command: faigate-health
    enabled: false
    rollback_command: ''
    timeout_seconds: 30
metadata:
  enabled: true
  on_startup: false
  refresh_interval_hours: 24
  timeout_seconds: 10
client_profiles:
  default: generic
  enabled: true
  presets:
  - openclaw
  - n8n
  - cli
  profiles:
    cli:
      routing_mode: auto
    generic: {}
    local-only:
      capability_values:
        local: true
    n8n:
      prefer_tiers:
      - cheap
      - default
      routing_mode: eco
    antigravity:
      prefer_providers:
      - gemini-flash-lite
      - gemini-flash
      - gemini-pro-high
      prefer_tiers:
      - cheap
      - default
      routing_mode: eco
    claude:
      routing_mode: coding-auto
    codex:
      routing_mode: coding-auto
    deepseek-cli:
      prefer_providers:
      - deepseek-chat
      - deepseek-reasoner
      - anthropic-haiku
      prefer_tiers:
      - default
      - reasoning
      routing_mode: auto
    gemini-cli:
      prefer_providers:
      - gemini-flash
      - gemini-flash-lite
      - gemini-pro-high
      prefer_tiers:
      - cheap
      - default
      - mid
      routing_mode: auto
    kilocode:
      routing_mode: coding-fast
    openclaw:
      routing_mode: coding-auto
    opencode:
      routing_mode: coding-auto
    # ── opencode named profiles (selectable as model in opencode UI) ─────────
    coding:
      routing_mode: coding-auto
    coding-free:
      prefer_providers:
      - kilocode
      - blackbox-free
      - gemini-flash-lite
      prefer_tiers:
      - free
      - cheap
      routing_mode: free
    research:
      routing_mode: premium
  rules:
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - antigravity
    profile: antigravity
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - claude
          - claude-code
    profile: claude
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - codex
    profile: codex
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - deepseek-cli
    profile: deepseek-cli
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - gemini-cli
    profile: gemini-cli
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - kilocode
          - kilo
    profile: kilocode
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - opencode
    profile: opencode
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - coding
          - coding-auto
    profile: coding
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - coding-free
          - free
    profile: coding-free
  - match:
      any:
      - header_contains:
          x-faigate-client:
          - research
    profile: research
fallback_chain:
- deepseek-chat
- anthropic-haiku
- gemini-flash
- deepseek-reasoner
- anthropic-sonnet
- gemini-pro-high
- openai-gpt4o
- openrouter-fallback
- anthropic-claude
- kilocode
- blackbox-free
health:
  check_interval_seconds: 300
  consecutive_failures_before_skip: 3
  recovery_check_interval_seconds: 60
  timeout_seconds: 10
heuristic_rules:
  enabled: true
  rules:
  - match:
      message_keywords:
        any_of:
        - prove
        - beweis
        - beweise
        - theorem
        - integral
        - derivative
        - equation
        - gleichung
        - induction
        - induktion
        - \boxed
        - \frac
        - \sum
        - \int
        - latex
        - step by step
        - "schritt f\xFCr schritt"
        - warum
        - why does
        - explain why
        - "erkl\xE4re warum"
        - "\u8BC1\u660E"
        - "\u5B9A\u7406"
        - "\u8A3C\u660E"
        - "\u0434\u043E\u043A\u0430\u0437\u0430\u0442\u044C"
        min_matches: 2
    name: math-reasoning
    route_to: deepseek-reasoner
  - match:
      message_keywords:
        any_of:
        - refactor
        - debug
        - architecture
        - design pattern
        - race condition
        - memory leak
        - optimize
        - complexity
        - security vulnerability
        - code review
        - performance bottleneck
        - type error
        - deadlock
        min_matches: 2
    name: complex-code
    route_to: deepseek-reasoner
  - match:
      message_keywords:
        any_of:
        - what is
        - was ist
        - define
        - definiere
        - translate
        - "\xFCbersetze"
        - hi
        - hello
        - hallo
        - thanks
        - danke
        - 'yes'
        - ja
        - 'no'
        - nein
        - "\u0447\u0442\u043E \u0442\u0430\u043A\u043E\u0435"
        - "\u4F60\u597D"
        - "\u3053\u3093\u306B\u3061\u306F"
        min_matches: 1
    name: simple-query
    route_to: gemini-flash-lite
  - match:
      has_tools: true
    name: tool-use
    route_to: deepseek-chat
  - match:
      estimated_tokens:
        less_than: 100
    name: short-message
    route_to: deepseek-chat
  - match:
      estimated_tokens:
        greater_than: 50000
    name: long-context
    route_to: deepseek-chat
  - match:
      fallthrough: true
    name: general-default
    route_to: deepseek-chat
llm_classifier:
  category_routing:
    AGENT: deepseek-chat
    CODING: deepseek-chat
    REASONING: deepseek-reasoner
    SIMPLE: gemini-flash-lite
  classifier_provider: gemini-flash-lite
  enabled: false
  fallback_on_timeout: deepseek-chat
  max_classify_tokens: 50
  prompt: 'Classify this task into exactly one category. Reply with ONLY the category
    name.

    Categories:

    - REASONING: math proofs, logic puzzles, complex analysis, debugging

    - CODING: code generation, refactoring, architecture decisions

    - SIMPLE: greetings, status checks, short lookups, translations

    - AGENT: tool use, file operations, search, API calls


    User message: {last_user_message}


    Category:

    '
  timeout_ms: 3000
metrics:
  db_path: faigate.db
  enabled: true
  log_requests: false
  log_routing_decisions: false
model_shortcuts:
  enabled: false
  shortcuts:
